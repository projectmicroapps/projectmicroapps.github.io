<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Micro | Mobile Apps</title>
    <style>
        :root { --primary: #3D5AFE; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; color: var(--text); line-height: 1.6; }
        header { background: #f8f9fa; padding: 2rem; text-align: center; border-bottom: 1px solid #eee; }
        .container { max-width: 900px; margin: auto; padding: 2rem; }
        .app-card { display: flex; align-items: center; gap: 20px; background: #fff; border: 1px solid #ddd; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; }
        .app-icon { width: 100px; height: 100px; border-radius: 22%; background: #eee; }
        .play-button img { height: 50px; }
        footer { text-align: center; padding: 2rem; font-size: 0.9rem; color: #666; }
        a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

<header>
    <h1>Project Micro</h1>
    <p>Innovative Tools & Games für Android</p>
</header>

<div class="container">
    <h2>Unsere Apps</h2>
    
    <div class="app-card">
        <div class="app-icon">
            <img src="icon-platzhalter.png" alt="App Icon" style="width:100%; border-radius:22%;">
        </div>
        <div>
            <h3>Deine App Name</h3>
            <p>Hier beschreibst du kurz und knackig, was deine App macht und warum man sie laden sollte.</p>
            <a href="DEIN_PLAYSTORE_LINK" class="play-button">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/de_badge_web_generic.png" alt="Jetzt bei Google Play">
            </a>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 Project Micro | 
    <a href="privacy.html">Datenschutzerklärung</a> | 
    <a href="impressum.html">Impressum</a>
</footer>

</body>
</html>

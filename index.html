<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Micro | Official Site</title>
    <style>
        /* Modernes Design-System */
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        /* Hero Sektion */
        header {
            padding: 80px 20px;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* App Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            flex-grow: 1;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .app-icon-placeholder {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #334155 0%, #0f172a 100%);
            border-radius: 25px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--accent);
            font-size: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        .play-store-badge {
            margin-top: 20px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .play-store-badge:hover {
            opacity: 1;
        }

        footer {
            padding: 40px;
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Für Handys optimieren */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Project Micro</h1>
        <p class="subtitle">Creative Apps & Development</p>
    </header>

    <div class="container">
        <div class="app-card">
            <div class="app-icon-placeholder">PM</div>
            <h2>Coming Soon</h2>
            <p style="color: var(--text-dim);">Wir arbeiten aktuell an spannenden neuen Apps für Android. Bleib gespannt!</p>
            
            <a href="#" class="play-store-badge">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/de_badge_web_generic.png" alt="Google Play" height="60">
            </a>
        </div>
    </div>

    <footer>
        &copy; 2026 Project Micro
    </footer>

</body>
</html>

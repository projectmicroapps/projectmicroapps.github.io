<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Micro | Official Site</title>
    <style>
        :root {
            /* Fallback Farben */
            --accent-color: #1A1C1E; 
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            /* Der vertikale Gradient wie in deiner MainActivity */
            background: linear-gradient(to bottom, var(--accent-color) 0%, #000000 100%);
            background-attachment: fixed;
            transition: background 0.8s ease;
        }

        header {
            padding: 80px 20px 40px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -1.5px;
        }

        .subtitle {
            opacity: 0.6;
            font-size: 1.1rem;
            margin-top: 8px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Glassmorphism App-Card (passend zum transparenten Surface-Look) */
        .app-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .app-icon {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 22px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { margin-bottom: 10px; }
        p { opacity: 0.8; line-height: 1.5; margin-bottom: 30px; }

        .play-store-badge img {
            height: 50px;
            transition: transform 0.2s ease;
        }

        .play-store-badge img:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <header>
        <h1>Project Micro</h1>
        <p class="subtitle">MikroTools & Mobile Solutions</p>
    </header>

    <div class="container">
        <div class="app-card">
            <div class="app-icon">MT</div>
            <h2>MikroTools</h2>
            <p>Konvertierung, Scannen und Tools in einer App. Schlicht, schnell und effizient.</p>
            
            <a href="#" class="play-store-badge">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/de_badge_web_generic.png" alt="Google Play">
            </a>
        </div>
    </div>

    <footer>
        &copy; 2026 Project Micro
    </footer>

    <script>
        // Deine exakte Farbliste aus dem Kotlin Code
        const mikroColors = [
            '#C0C0C0', // Silver
            '#01163E', // Deep Blue
            '#013E16', // Deep Green
            '#2B013E', // Deep Purple
            '#3E0101', // Deep Red
            '#1A1C1E'  // Dark Grey
        ];

        // Zufallsauswahl
        const randomColor = mikroColors[Math.floor(Math.random() * mikroColors.length)];

        // Setzt die CSS Variable für den Gradient-Start
        document.documentElement.style.setProperty('--accent-color', randomColor);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Micro | Official Site</title>
    <style>
        :root {
            /* Diese Farben werden per JS überschrieben, dienen aber als Fallback */
            --grad-1: #0f172a;
            --grad-2: #1e293b;
            --accent: #ffffff;
        }

        body {
            /* Der dynamische Gradient */
            background: linear-gradient(135deg, var(--grad-1) 0%, var(--grad-2) 100%);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease; /* Weicher Übergang beim Laden */
        }

        header {
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .subtitle {
            opacity: 0.7;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            flex-grow: 1;
        }

        /* Orientiert an deinen NavigationBarItems (Transparenz & Glas-Look) */
        .app-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .app-icon-placeholder {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .play-store-badge img {
            height: 55px;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .play-store-badge img:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Project Micro</h1>
        <p class="subtitle">MikroTools & Development</p>
    </header>

    <div class="container">
        <div class="app-card">
            <div class="app-icon-placeholder">MT</div>
            <h2>MikroTools</h2>
            <p>Dein All-in-One Begleiter für Tools, Konvertierung und Scan.</p>
            
            <a href="#" class="play-store-badge">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/de_badge_web_generic.png" alt="Google Play">
            </a>
        </div>
    </div>

    <footer>
        &copy; 2026 Project Micro | Built with Github Pages
    </footer>

    <script>
        // Hier definierst du die Farbkombinationen für deine App
        const themes = [
            { c1: '#0f172a', c2: '#1e293b' }, // Dark Slate (Standard)
            { c1: '#1a1a2e', c2: '#16213e' }, // Deep Blue
            { c1: '#2d033b', c2: '#810ca8' }, // Cyber Purple
            { c1: '#000000', c2: '#434343' }, // Pure Dark
            { c1: '#051937', c2: '#008793' }  // Deep Sea
        ];

        // Zufälliges Theme wählen
        const randomTheme = themes[Math.floor(Math.random() * themes.length)];

        // CSS Variablen im Root-Element setzen
        document.documentElement.style.setProperty('--grad-1', randomTheme.c1);
        document.documentElement.style.setProperty('--grad-2', randomTheme.c2);
    </script>
</body>
</html>
